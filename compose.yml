services:
  app:
    image: fitme-app:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:docker}
      KAKAO_API_KEY: ${KAKAO_API_KEY}
      OPEN_WEATHER_API_KEY: ${OPEN_WEATHER_API_KEY}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      AZURE_LOG_STORAGE_ACCOUNT_NAME: ${AZURE_LOG_STORAGE_ACCOUNT_NAME}
      AZURE_LOG_STORAGE_ACCOUNT_KEY: ${AZURE_LOG_STORAGE_ACCOUNT_KEY}
      JAVA_OPTS: -Xms256m -Xmx512m
    volumes:
      - fitme-storage:/app/storage
      - fitme-logs:/app/.logs
    ports: # 추후에는 nginx가 외부에서 받아서 app으로 연결하기때문에 나중에 compose Port에서 지우도록 한다.
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
#    depends_on:
#      postgres: # postgres라는 동작에 의존하고 이게 될때까지 위의서비스는 대기
#        condition: service_healthy # 해당 서비스(postgres)가 healthy해야만 동작하도록 조건 추가 및 대기
#      redis:
#        condition: service_started # healthcheck와 상관없이 단순 컨테이너가 시작하기만 하면 되는 조건
    networks:
      - fitme-backend-network

# 볼륨 정의, local일경우 생략가능하지만 명시
volumes:
  fitme-storage:
    driver: local
  fitme-logs:
    driver: local
#  my-postgres-data:
#    driver: local # 볼륨 데이터를 호스트의 로컬에 저장
#  redis-data:
#    driver: local

# 네트워크 설정
networks:
  fitme-backend-network:
    driver: bridge







