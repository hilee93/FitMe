services:
  app:
    image: fitme-app:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      KAKAO_API_KEY: ${KAKAO_API_KEY}
      OPEN_WEATHER_API_KEY: ${OPEN_WEATHER_API_KEY}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      AZURE_LOG_STORAGE_ACCOUNT_NAME: ${AZURE_LOG_STORAGE_ACCOUNT_NAME}
      AZURE_LOG_STORAGE_ACCOUNT_KEY: ${AZURE_LOG_STORAGE_ACCOUNT_KEY}
      JAVA_OPTS: -Xms256m -Xmx512m
    volumes:
      - fitme-storage:/app/storage
      - fitme-logs:/app/.logs
    ports: # 추후에는 nginx가 외부에서 받아서 app으로 연결하기때문에 나중에 compose Port에서 지우도록 한다.
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres: # postgres라는 동작에 의존하고 이게 될때까지 위의서비스는 대기
        condition: service_healthy # 해당 서비스(postgres)가 healthy해야만 동작하도록 조건 추가 및 대기
      redis:
        condition: service_started # healthcheck와 상관없이 단순 컨테이너가 시작하기만 하면 되는 조건
      broker:
        condition: service_healthy
    networks:
      - fitme-backend-network

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres1234
    ports:
      - "5433:5432" # 외부 사용시 로컬에 이미 실행중이면 충돌날수있기때문에 5433으로 사용
    volumes:
      - fitme-postgres-data:/var/lib/postgresql/data
    # DB에서도 사용하는 메모리 제한 설정
    command: >
      postgres 
      -c shared_buffers=128MB 
      -c max_connections=50

    healthcheck: # 컨테이너가 정상인지 주기적으로 확인
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 10s # 실패할시 10초마다 재시도
      timeout: 5s # 5초안에 응답없다면 실패 간주 unhealthy
      retries: 5 # 재시도 횟수, 이후 unhealthy로 판정
    networks:
      - fitme-backend-network
  redis:
    image: redis:7.4.8-alpine3.21
    ports:
      - "6380:6379" # 로컬 실행중 충돌방지 6380으로 설정
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru # 레디스 메모리 제한
    volumes:
      - fitme-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - fitme-backend-network

  broker:
    image: apache/kafka:latest
    ports:
      - 9094:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:29092,EXTERNAL://localhost:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: INTERNAL://broker:29092,CONTROLLER://broker:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL # 브로커가 여러개이고 클러스터내부에서 서로 통신할때 해당 리스너 이름으로 소통해라 라고 정의
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - fitme-kafka-data:/var/lib/kafka/data
    networks:
      - fitme-backend-network
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost 9092" ]
      interval: 10s
      timeout: 5s
      retries: 5



# 볼륨 정의, local일경우 생략가능하지만 명시
volumes:
  fitme-storage:
    driver: local
  fitme-logs:
    driver: local
  fitme-postgres-data:
    driver: local # 볼륨 데이터를 호스트의 로컬에 저장
  fitme-redis-data:
    driver: local
  fitme-kafka-data:
    driver: local

# 네트워크 설정
networks:
  fitme-backend-network:
    driver: bridge







