name: CD-Deploy
on:
  workflow_run:
    workflows: [ "CI-Image" ]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name fitme-app \
            --resource-group fitme \
            --image fitmeacrprod.azurecr.io/fitme-app:${{ github.event.workflow_run.head_sha }}
