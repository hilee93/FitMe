spring:
  datasource:
    url: jdbc:h2:mem:fitme;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # HikariCP 튜닝(local 에서 테스트해볼때 쓸것)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 30000
      max-lifetime: 1800000
  h2:
    console:
      enabled: on
      path: /h2-console
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: validate

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379

    elasticsearch:
      uris: http://localhost:9200

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    com.ootd: debug
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    caches:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
  info:
    env:
      enabled: true
  observations:
    annotations:
      enabled: true

fitme:
  storage:
    type: local

server:
  port: 8080