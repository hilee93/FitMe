spring:
  application:
    name: fitme
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50
        type:
          preferred_instant_jdbc_type: TIMESTAMP_WITH_TIMEZONE
        order_inserts: true
        order_updates: true
        jdbc:
          time_zone: UTC
          batch_size: 50
    open-in-view: false

  batch:
    job:
      enabled: false

  ai:
    openai:
      api-key: ${AI_API_KEY:dummy_key}
      base-url: https://api.groq.com/openai/v1
      chat:
        completions-path: /chat/completions
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.1
      retry:
        max-attempts: 1

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          kakao:
            client-id: ${KAKAO_API_KEY:}
            client-secret: ${KAKAO_OAUTH_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: kakao
            scope:
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

fitme:
  storage:
    type: azure
    azure:
      credentials:
        account-name: ${AZURE_STORAGE_ACCOUNT_NAME}
        account-key: ${AZURE_STORAGE_ACCOUNT_KEY}
      region:
        static: koreacentral
      blob:
        base-url: https://fitmeblobstorage.blob.core.windows.net
        container: fitme-v1-container
        log-container: fitme-log-v1-container

  user:
    temp-password:
      mail:
        enabled: false
        from: DoNotReply@0826e947-ae51-4c84-9b02-5e4e1931293c.azurecomm.net
        subject: "[FitMe] 임시 비밀번호 안내"

# prod제외 모든 환경에서 환경변수 값으로 동적이거나 보안적으로 가릴 필요없기때문에 공통적인 값은 그대로 쓰는방식, Prod에서만 환경변수로 오버라이딩 처리
jwt:
  secret-key: mySecretKeyForJwtTokenGeneration1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
  access-token-expiration-ms: 900000      # 15분
  refresh-token-expiration-ms: 1209600000 # 2주
  issuer: fitme

logging:
  level:
    root: info
    org.apache.kafka: error

external:
  kakao:
    rest-api-key: ${KAKAO_API_KEY}
    local:
      base-url: https://dapi.kakao.com
      coord2region-path: /v2/local/geo/coord2regioncode.json

  openweather:
    rest-api-key: ${OPEN_WEATHER_API_KEY}
    base-url: https://api.openweathermap.org
    forecast-path: /data/2.5/forecast

# 운영 Prod에서 오버라이딩 할예정이라 그대로 씀
admin:
  bootstrap:
    enabled: true
    email: admin@test.com
    password: admin123
    profile-name: admin
    reset-password: false

security:
  cors:
    allowed-origins:
      - http://localhost
      - http://localhost:8080

server:
  forward-headers-strategy: framework
