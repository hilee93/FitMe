spring:
  application:
    name: fitme
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50
        type:
          preferred_instant_jdbc_type: TIMESTAMP_WITH_TIMEZONE
        order_inserts: true
        order_updates: true
        jdbc:
          time_zone: UTC
          batch_size: 50
    open-in-view: false

  batch:
    job:
      enabled: false

  autoconfigure: # TODO: 추후 도커 redis 서버 연결시 redis 자동설정 무시했던 이부분 지울것
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  storage:
    type: azure # s3?? azure(?? blob)? ??
    app:
      azure: # aws?? azure? ??
        cdn: # cloud-front?? cdn?? ??
          domain: https://your-cdn-endpoint.azureedge.net # Azure CDN ??? ??
        credentials:
          account-name: ${AZURE_STORAGE_ACCOUNT_NAME}
          account-key: ${AZURE_STORAGE_ACCOUNT_KEY}
        log-credentials:
          account-name: ${AZURE_LOG_STORAGE_ACCOUNT_NAME}
          account-key: ${AZURE_LOG_STORAGE_ACCOUNT_KEY}
        region:
          static: koreacentral # ap-northeast-2(??)? ???? Azure ???
        blob: # s3?? blob?? ??
          container: fitme-v1-container # bucket?? container? ??
          log-container: wardrobe-v1-log-container

jwt:
  secret-key: ${JWT_SECRET:mySecretKeyForJwtTokenGeneration1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ}
  access-token-expiration-ms: 900000      # 15분
  refresh-token-expiration-ms: 1209600000 # 2주
  issuer: fitme


logging:
  level:
    root: info

external:
  kakao:
    rest-api-key: ${KAKAO_API_KEY}
    local:
      base-url: https://dapi.kakao.com
      coord2region-path: /v2/local/geo/coord2regioncode.json

  openweather:
    rest-api-key: ${OPEN_WEATHER_API_KEY}
    base-url: https://api.openweathermap.org
    forecast-path: /data/2.5/forecast

security:
  cors:
    allowed-origins:

# 운영단계에서 확인 필요
admin:
  bootstrap:
    enabled: false
    email:
    password:
    profile-name:
    reset-password: false